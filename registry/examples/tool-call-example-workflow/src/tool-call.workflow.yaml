title: 'LLM Tool Calling Example (Berlin Weather)'

description: An example workflow that demonstrates how to use an LLM to call external tools and handle their responses.

transitions:
  - id: setup
    from: start
    to: ready
    call:
      - tool: createDocument
        args:
          document: claudeMessageDocument
          update:
            content:
              role: user
              content: How is the weather in Berlin?

  - id: llm_turn
    from: ready
    to: prompt_executed
    call:
      - id: llm_call
        tool: claudeGenerateText
        args:
          claude:
            model: claude-sonnet-4-6
          messagesSearchTag: message
          tools:
            - getWeather
        assign:
          llmResult: ${{ result.data }}

  - id: execute_tool_calls
    from: prompt_executed
    to: awaiting_tools
    if: ${{ state.llmResult.stop_reason == 'tool_use' }}
    call:
      - tool: delegateToolCalls
        args:
          message: ${{ state.llmResult }}
          document: claudeMessageDocument
        assign:
          delegateResult: ${{ result.data }}

  - id: all_tools_complete
    from: awaiting_tools
    to: ready
    if: ${{ state.delegateResult.allCompleted }}

  - id: respond
    from: prompt_executed
    to: end
    call:
      - tool: createDocument
        args:
          id: ${{ state.llmResult.id }}
          document: claudeMessageDocument
          update:
            content: ${{ state.llmResult }}
