title: Secrets Agent Example

description: |
  An agent workflow where the LLM autonomously manages secrets by calling
  getSecretKeys and requestSecrets tools. The user can send follow-up messages.

ui:
  widgets:
    - widget: prompt-input
      enabledWhen:
        - waiting_for_user
      options:
        transition: user_message
        label: Send Message

transitions:
  - id: setup
    from: start
    to: ready
    call:
      - tool: createDocument
        args:
          document: claudeMessageDocument
          update:
            meta:
              hidden: true
            content:
              role: user
              content: |
                Check what secrets are available in the workspace using getSecretKeys.
                If EXAMPLE_API_KEY and EXAMPLE_SECRET are not yet stored, request them from the user.
                After secrets are stored, verify by listing them again and summarize.

  - id: llm_turn
    from: ready
    to: prompt_executed
    call:
      - id: llm_call
        tool: claudeGenerateText
        args:
          system: |
            You are a helpful assistant that manages workspace secrets.
            Use getSecretKeys to check existing secrets, and requestSecrets to ask the user for new ones.

            IMPORTANT: When using requestSecrets, it must be the ONLY tool call in your response.
            Do not combine it with other tool calls.
          claude:
            model: claude-haiku-4-5-20251001
          messagesSearchTag: message
          tools:
            - getSecretKeys
            - requestSecrets
        assign:
          llmResult: ${{ result.data }}

  - id: execute_tool_calls
    from: prompt_executed
    to: awaiting_tools
    if: ${{ state.llmResult.stop_reason == 'tool_use' }}
    call:
      - tool: delegateToolCalls
        args:
          message: ${{ state.llmResult }}
          document: claudeMessageDocument
          callback:
            transition: tool_result_received
        assign:
          delegateResult: ${{ result.data }}

  - id: tool_result_received
    from: awaiting_tools
    to: awaiting_tools
    trigger: manual
    call:
      - tool: updateToolResult
        args:
          delegateResult: ${{ state.delegateResult }}
          completedTool: ${{ runtime.transition.payload }}
          document: claudeMessageDocument
        assign:
          delegateResult: ${{ result.data }}

  - id: all_tools_complete
    from: awaiting_tools
    to: ready
    if: ${{ state.delegateResult.allCompleted }}

  - id: respond
    from: prompt_executed
    to: waiting_for_user
    call:
      - tool: createDocument
        args:
          id: ${{ state.llmResult.id }}
          document: claudeMessageDocument
          update:
            content: ${{ state.llmResult }}

  - id: user_message
    from: waiting_for_user
    to: ready
    trigger: manual
    call:
      - tool: createDocument
        args:
          document: claudeMessageDocument
          update:
            content:
              role: user
              content: ${{ runtime.transition.payload }}
