title: Secrets Agent Example

description: |
  An agent workflow where the LLM autonomously manages secrets by calling
  getSecretKeys and requestSecrets tools. The user can send follow-up messages.

ui:
  actions:
    - type: custom
      widget: prompt-input
      enabledWhen:
        - waiting_for_user
      options:
        transition: user_message
        label: Send Message

transitions:
  # 1. Initial user message
  - id: setup
    from: start
    to: ready
    call:
      - tool: createDocument
        args:
          document: claudeMessageDocument
          update:
            meta:
              hidden: true
            content:
              role: user
              content: |
                Check what secrets are available in the workspace using getSecretKeys.
                If EXAMPLE_API_KEY and EXAMPLE_SECRET are not yet stored, request them from the user.
                After secrets are stored, verify by listing them again and summarize.

  # 2. LLM turn
  - id: llm_turn
    from: ready
    to: prompt_executed
    call:
      - id: llm_call
        tool: claudeGenerateText
        args:
          system: |
            You are a helpful assistant that manages workspace secrets.
            Use getSecretKeys to check existing secrets, and requestSecrets to ask the user for new ones.

            IMPORTANT: When using requestSecrets, it must be the ONLY tool call in your response.
            Do not combine it with other tool calls.
          claude:
            model: claude-haiku-4-5-20251001
          messagesSearchTag: message
          tools:
            - getSecretKeys
            - requestSecrets

      - tool: createDocument
        args:
          id: ${{ runtime.tools.llm_turn.llm_call.data.id }}
          document: claudeMessageDocument
          update:
            content: ${{ runtime.tools.llm_turn.llm_call.data }}

  # 3. Route: tool calls present — delegate and store result
  - id: route_with_tool_calls
    from: prompt_executed
    to: tool_calls_executed
    if: ${{ !!runtime.tools.llm_turn.llm_call.data.toolCalls }}
    call:
      - id: delegate
        tool: claudeDelegateToolCall
        args:
          message: ${{ runtime.tools.llm_turn.llm_call.data }}
          document: claudeMessageDocument
        assign:
          delegateResult: ${{ result.data }}

  # 3.b) Route: no tool calls — present result to user
  - id: route_without_tool_calls
    from: prompt_executed
    to: waiting_for_user

  # 4. Route: requestSecrets was called - display request form
  - id: route_with_request_secrets
    from: tool_calls_executed
    to: requesting_secrets
    if: ${{ !!state.delegateResult.toolCalls.requestSecrets }}
    debug: true
    call:
      - tool: createDocument
        args:
          document: secretRequestDocument
          update:
            content:
              variables: ${{ state.delegateResult.toolCalls.requestSecrets.output.variables }}

  # 4.b) return to ready, when tools were called, but requestSecrets was not called
  - id: loop_when_no_secret_request
    from: tool_calls_executed
    to: ready

  # 5. User submits secrets — provide tool result back to LLM
  - id: secrets_submitted
    from: requesting_secrets
    to: ready
    trigger: manual
    call:
      - tool: createDocument
        args:
          document: claudeMessageDocument
          update:
            content:
              role: assistant
              content: Secrets have been stored securely by the user.

  # 6. User follow-up message
  - id: user_message
    from: waiting_for_user
    to: ready
    trigger: manual
    call:
      - tool: createDocument
        args:
          document: claudeMessageDocument
          update:
            content:
              role: user
              content: ${{ runtime.transition.payload }}
