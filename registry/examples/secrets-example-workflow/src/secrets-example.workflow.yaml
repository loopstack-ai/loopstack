title: Secrets Update Example

description: A simple workflow that requests secrets from the user and then verifies they were stored.

transitions:
  - id: request_secrets
    from: start
    to: requesting_secrets
    call:
      - tool: requestSecrets
        args:
          variables:
            - key: EXAMPLE_API_KEY
              description: An example API key for testing
            - key: EXAMPLE_SECRET
              description: An example secret value for testing

      - tool: createDocument
        args:
          document: secretRequestDocument
          update:
            content:
              variables:
                - key: EXAMPLE_API_KEY
                  description: An example API key for testing
                - key: EXAMPLE_SECRET
                  description: An example secret value for testing

  - id: secrets_submitted
    from: requesting_secrets
    to: verifying
    trigger: manual
    call:
      - tool: getSecretKeys
        assign:
          secretKeys: ${{ result.data }}

  - id: show_result
    from: verifying
    to: end
    call:
      - tool: createDocument
        args:
          document: markdownDocument
          update:
            content:
              markdown: |
                # Secrets Verified

                The following secrets are now stored:

                {{#each state.secretKeys}}
                - **{{this.key}}**: {{#if this.hasValue}}has value{{else}}no value{{/if}}
                {{/each}}
