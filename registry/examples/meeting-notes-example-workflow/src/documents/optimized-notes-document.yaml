type: document
ui:
  widgets:
    - widget: form
      options:
        order:
          - date
          - summary
          - participants
          - decisions
          - actionItems
        properties:
          date:
            title: Date
          summary:
            title: Summary
            widget: textarea
          participants:
            title: Participants
            collapsed: true
            items:
              title: Participant
          decisions:
            title: Decisions
            collapsed: true
            items:
              title: Decision
          actionItems:
            title: Action Items
            collapsed: true
            items:
              title: Action Item
        actions:
          - type: button
            transition: confirm
            label: 'Confirm'
