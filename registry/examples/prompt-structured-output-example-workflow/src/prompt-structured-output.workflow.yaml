title: 'Structured Output Example (Hello World Script)'

description: An example workflow that demonstrates how to generate a structured output in Loopstack on the example of creating a "Hello, World!" script in a specified programming language.

ui:
  form:
    properties:
      language:
        title: 'What programming language should the script be in?'
        widget: select

transitions:
  - id: greeting
    from: start
    to: ready
    call:
      - tool: createDocument
        args:
          id: status
          document: claudeMessageDocument
          update:
            content:
              role: assistant
              content:
                - type: text
                  text: Creating a 'Hello, World!' script in {{ args.language }}...

  - id: prompt
    from: ready
    to: prompt_executed
    call:
      - id: llm_call
        tool: claudeGenerateDocument
        args:
          claude:
            model: claude-sonnet-4-6
          response:
            document: fileDocument
          prompt: |
            Create a {{ args.language }} script that prints 'Hello, World!' to the console.
            Wrap the code in triple-backticks.

  - id: respond
    from: prompt_executed
    to: end
    call:
      - tool: createDocument
        args:
          id: status
          document: claudeMessageDocument
          update:
            content:
              role: assistant
              content:
                - type: text
                  text: |
                    Successfully generated: {{ runtime.tools.prompt.llm_call.data.content.description }}
