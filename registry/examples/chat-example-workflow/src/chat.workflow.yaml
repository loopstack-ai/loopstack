title: 'LLM Chat Example (Assistant Bob)'

description: An example workflow that demonstrates how to create a simple chat interface. Messages are processed by an LLM to generate responses.

ui:
  actions:
    - type: custom
      widget: prompt-input
      enabledWhen:
        - waiting_for_user
      options:
        transition: user_message
        label: Send Message

transitions:
  - id: setup
    from: start
    to: waiting_for_user
    call:
      - tool: createDocument
        args:
          document: claudeMessageDocument
          update:
            meta:
              hidden: true
            content:
              role: user
              content: |
                You are a helpful assistant named Bob.
                Always tell the user your name.

  - id: user_message
    from: waiting_for_user
    to: ready
    trigger: manual
    call:
      - tool: createDocument
        args:
          document: claudeMessageDocument
          update:
            content:
              role: user
              content: ${{ runtime.transition.payload }}

  - id: llm_turn
    from: ready
    to: prompt_executed
    call:
      - id: llm_call
        tool: claudeGenerateText
        args:
          claude:
            model: claude-sonnet-4-6
          messagesSearchTag: message
        assign:
          llmResult: ${{ result.data }}

  - id: respond
    from: prompt_executed
    to: waiting_for_user
    call:
      - tool: createDocument
        args:
          id: ${{ state.llmResult.id }}
          document: claudeMessageDocument
          update:
            content: ${{ state.llmResult }}
