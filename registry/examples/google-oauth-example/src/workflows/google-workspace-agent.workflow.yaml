title: 'Google Workspace Agent'

description: |
  An interactive chat agent with access to Google Calendar, Gmail, and Google Drive.
  Ask it to check your calendar, search emails, find files, send messages, create events, and more.
  Handles OAuth authentication automatically when needed — the agent detects unauthorized errors
  and launches authentication on its own.

ui:
  widgets:
    - widget: prompt-input
      enabledWhen:
        - waiting_for_user
      options:
        transition: user_message
        label: Send Message

transitions:
  - id: setup
    from: start
    to: waiting_for_user
    call:
      - tool: createDocument
        args:
          document: claudeMessageDocument
          update:
            meta:
              hidden: true
            content:
              role: user
              content: |
                You are a helpful Google Workspace assistant. You have access to the user's
                Google Calendar, Gmail, and Google Drive through the tools provided to you.

                You can help with:
                - **Calendar**: List calendars, fetch events, create new events
                - **Gmail**: Search messages, read full emails, send new emails, reply to threads
                - **Drive**: Search files, get file details, download/export files, upload files

                When using date/time parameters, always use ISO 8601 format.

                When a tool returns `{ error: "unauthorized" }` or `{ error: "401" }`, call the
                `authenticateGoogle` tool with the required OAuth scopes to let the user sign in.
                After authentication completes, retry the original request.

                Common scopes:
                - Calendar: https://www.googleapis.com/auth/calendar.events
                - Gmail: https://www.googleapis.com/auth/gmail.modify
                - Drive: https://www.googleapis.com/auth/drive

                IMPORTANT: When using authenticateGoogle, it must be the ONLY tool call in your response.

                Be concise and helpful. Format results clearly using markdown.

  - id: user_message
    from: waiting_for_user
    to: ready
    trigger: manual
    call:
      - tool: createDocument
        args:
          document: claudeMessageDocument
          update:
            content:
              role: user
              content: ${{ runtime.transition.payload }}

  - id: llm_turn
    from: ready
    to: prompt_executed
    call:
      - id: llm_call
        tool: claudeGenerateText
        args:
          system: |
            You are a helpful Google Workspace assistant with access to Calendar, Gmail, and Drive tools.
            When a tool returns an unauthorized error, use authenticateGoogle to let the user sign in,
            then retry. Be concise and format results using markdown.
          claude:
            model: claude-sonnet-4-6
          messagesSearchTag: message
          tools:
            - googleCalendarListCalendars
            - googleCalendarFetchEvents
            - googleCalendarCreateEvent
            - gmailSearchMessages
            - gmailGetMessage
            - gmailSendMessage
            - gmailReplyToMessage
            - googleDriveListFiles
            - googleDriveGetFileMetadata
            - googleDriveDownloadFile
            - googleDriveUploadFile
            - authenticateGoogle
        assign:
          llmResult: ${{ result.data }}

  - id: execute_tool_calls
    from: prompt_executed
    to: awaiting_tools
    if: ${{ state.llmResult.stop_reason == 'tool_use' }}
    call:
      - tool: delegateToolCalls
        args:
          message: ${{ state.llmResult }}
          document: claudeMessageDocument
          callback:
            transition: tool_result_received
        assign:
          delegateResult: ${{ result.data }}

  - id: tool_result_received
    from: awaiting_tools
    to: awaiting_tools
    trigger: manual
    call:
      - tool: updateToolResult
        args:
          delegateResult: ${{ state.delegateResult }}
          completedTool: ${{ runtime.transition.payload }}
          document: claudeMessageDocument
        assign:
          delegateResult: ${{ result.data }}

  - id: all_tools_complete
    from: awaiting_tools
    to: ready
    if: ${{ state.delegateResult.allCompleted }}

  - id: respond
    from: prompt_executed
    to: waiting_for_user
    call:
      - tool: createDocument
        args:
          id: ${{ state.llmResult.id }}
          document: claudeMessageDocument
          update:
            content: ${{ state.llmResult }}
