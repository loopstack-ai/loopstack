title: 'Google Workspace Agent'

description: |
  An interactive chat agent with access to Google Calendar, Gmail, and Google Drive.
  Ask it to check your calendar, search emails, find files, send messages, create events, and more.
  Handles OAuth authentication automatically when needed.

ui:
  actions:
    - type: custom
      widget: prompt-input
      enabledWhen:
        - waiting_for_user
      options:
        transition: user_message
        label: Send Message

transitions:
  # Set up the system prompt
  - id: setup
    from: start
    to: waiting_for_user
    call:
      - tool: createDocument
        args:
          document: aiMessageDocument
          update:
            meta:
              hidden: true
            content:
              role: system
              parts:
                - type: text
                  text: |
                    You are a helpful Google Workspace assistant. You have access to the user's
                    Google Calendar, Gmail, and Google Drive through the tools provided to you.

                    You can help with:
                    - **Calendar**: List calendars, fetch events, create new events
                    - **Gmail**: Search messages, read full emails, send new emails, reply to threads
                    - **Drive**: Search files, get file details, download/export files, upload files

                    When using date/time parameters, always use ISO 8601 format.
                    When a tool returns { error: "unauthorized" }, tell the user they need to
                    authenticate with Google and that the authentication flow has been started.

                    Be concise and helpful. Format results clearly using markdown.

  # User sends a message
  - id: user_message
    from: waiting_for_user
    to: ready
    trigger: manual
    call:
      - tool: createDocument
        args:
          document: aiMessageDocument
          update:
            content:
              role: user
              parts:
                - type: text
                  text: ${{ runtime.transition.payload }}

  # LLM processes the conversation and may call tools
  - id: llm_turn
    from: ready
    to: llm_responded
    call:
      - id: llm_call
        tool: aiGenerateText
        args:
          llm:
            provider: openai
            model: gpt-4o
          messagesSearchTag: message
          tools:
            - googleCalendarListCalendars
            - googleCalendarFetchEvents
            - googleCalendarCreateEvent
            - gmailSearchMessages
            - gmailGetMessage
            - gmailSendMessage
            - gmailReplyToMessage
            - googleDriveListFiles
            - googleDriveGetFileMetadata
            - googleDriveDownloadFile
            - googleDriveUploadFile

      - tool: createDocument
        args:
          id: ${{ runtime.tools.llm_turn.llm_call.data.id }}
          document: aiMessageDocument
          update:
            content: ${{ runtime.tools.llm_turn.llm_call.data }}

  # LLM wants to call tools → execute them and check for auth errors
  - id: execute_tool_calls
    from: llm_responded
    to: tools_executed
    if: ${{ isToolCall(runtime.tools.llm_turn.llm_call.data) }}
    call:
      - id: delegate
        tool: delegateToolCall
        args:
          message: ${{ runtime.tools.llm_turn.llm_call.data }}
        assign:
          requiresAuthentication: ${{ checkAuthError(result.data) }}

      - tool: createDocument
        args:
          id: ${{ runtime.tools.execute_tool_calls.delegate.data.id }}
          document: aiMessageDocument
          update:
            content: ${{ runtime.tools.execute_tool_calls.delegate.data }}

  # Tool returned auth error → launch OAuth
  - id: handle_auth_error
    from: tools_executed
    to: awaiting_auth
    if: ${{ state.requiresAuthentication }}
    call:
      - tool: executeWorkflowAsync
        id: launchAuth
        args:
          workflow: oAuth
          args:
            provider: 'google'
            scopes:
              - 'https://www.googleapis.com/auth/calendar.events'
              - 'https://www.googleapis.com/auth/gmail.modify'
              - 'https://www.googleapis.com/auth/drive'
          callback:
            transition: auth_completed

      - tool: createDocument
        args:
          id: authStatus
          document: linkDocument
          update:
            content:
              icon: 'LockKeyhole'
              label: 'Google authentication required'
              caption: 'Complete sign-in to access Google Workspace'
              href: '/pipelines/{{ runtime.tools.handle_auth_error.launchAuth.data.task.pipelineId }}'
              embed: true
              expanded: true

  # No auth error → loop back to LLM with tool results
  - id: continue_after_tools
    from: tools_executed
    to: ready

  # Auth completed → notify and wait for user to continue
  - id: auth_completed
    from: awaiting_auth
    to: waiting_for_user
    trigger: manual
    call:
      - tool: createDocument
        args:
          id: authStatus
          document: linkDocument
          update:
            content:
              icon: 'ShieldCheck'
              type: 'success'
              label: 'Google authentication completed'
              caption: 'You can now use Google Workspace tools'
              href: '/pipelines/{{ runtime.transition.payload.pipelineId }}'

      - tool: createDocument
        args:
          document: aiMessageDocument
          update:
            content:
              role: assistant
              parts:
                - type: text
                  text: Google authentication completed successfully! You can now ask me to access your Calendar, Gmail, or Drive.

  # LLM responded with text (no tool calls) → show response and wait
  - id: show_response
    from: llm_responded
    to: waiting_for_user
