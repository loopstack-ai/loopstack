# =============================================================================
# Release
# =============================================================================
# Triggered by push to `main`, which happens when a PR (develop → main) is
# merged.
#
# Uses changesets/action which handles two modes automatically:
#   1. Changesets present → creates/updates a "Version Packages" PR
#   2. Version PR merged (no changesets) → publishes to npm
#
# After publishing, fires a repository_dispatch to smoke-testing for
# post-release validation against the real npm packages.
# =============================================================================

name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

env:
  NODE_VERSION: '22'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
      studioVersion: ${{ steps.studio-version.outputs.version }}

    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
          version: npm run changeset:version
          commit: 'chore: release'
          title: 'chore: release'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Delete changeset-release branch
        if: steps.changesets.outputs.published == 'true'
        run: git push origin --delete changeset-release/main || true

      - name: Extract Studio version
        id: studio-version
        if: steps.changesets.outputs.published == 'true'
        run: |
          VERSION=$(echo '${{ steps.changesets.outputs.publishedPackages }}' | jq -r '.[] | select(.name == "@loopstack/loopstack-studio") | .version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Summary of published packages
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "Published packages:"
          echo '${{ steps.changesets.outputs.publishedPackages }}' | jq '.'

  studio-docker:
    name: Publish Studio Docker image
    needs: release
    if: needs.release.outputs.published == 'true' && contains(needs.release.outputs.publishedPackages, '@loopstack/loopstack-studio')
    uses: ./.github/workflows/release-studio-docker.yml
    with:
      version: ${{ needs.release.outputs.studioVersion }}
    permissions:
      contents: read
      packages: write

  post-release-hook:
    name: Post-release hook
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch post-release event
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SMOKE_TESTING_TOKEN }}
          repository: loopstack-ai/smoke-testing
          event-type: loopstack-released
          client-payload: '{"packages": ${{ needs.release.outputs.publishedPackages }}}'

  sync-develop:
    name: Sync develop with main
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: develop
          fetch-depth: 0

      - name: Reset develop to main
        run: |
          AHEAD=$(git rev-list --count origin/main..origin/develop)
          if [ "$AHEAD" -eq 0 ]; then
            echo "develop has no extra commits — resetting to main"
            git push origin origin/main:refs/heads/develop --force
          else
            echo "::warning::develop is $AHEAD commit(s) ahead of main — skipping reset to avoid losing work. Merge main into develop manually."
          fi
