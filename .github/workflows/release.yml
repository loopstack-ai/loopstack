# ============================================================================
# Release Workflow - Stable releases via Changesets
# ============================================================================
# This workflow handles:
# - Creating/updating a "Version Packages" PR when changesets are merged
# - Publishing to NPM when the version PR is merged
# - Syncing all package versions automatically
# ============================================================================

name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

env:
  NODE_VERSION: '20'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    # Only run the real release on main. Manual dispatch from a feature
    # branch skips this job and lets smoke-gate run in isolation.
    if: github.ref == 'refs/heads/main'
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      studio_published: ${{ contains(steps.changesets.outputs.publishedPackages, '@loopstack/loopstack-studio') }}
      studio_version: ${{ steps.studio-version.outputs.version }}
      has_changesets: ${{ steps.changesets.outputs.hasChangesets }}
      pr_number: ${{ steps.changesets.outputs.pullRequestNumber }}

    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Fetch all history for changeset to analyze
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Create Release PR or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
          version: npm run changeset:version
          commit: 'chore: release'
          title: 'chore: release'
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Delete changeset-release branch
        if: steps.changesets.outputs.published == 'true'
        run: git push origin --delete changeset-release/main || true

      - name: Extract Loopstack Studio Version
        id: studio-version
        if: steps.changesets.outputs.published == 'true' && contains(steps.changesets.outputs.publishedPackages, '@loopstack/loopstack-studio')
        run: |
          version=$(echo '${{ steps.changesets.outputs.publishedPackages }}' | jq -r '.[] | select(.name == "@loopstack/loopstack-studio") | .version')
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Summary of published packages
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "🎉 Published packages:"
          echo '${{ steps.changesets.outputs.publishedPackages }}' | jq '.'

  smoke-gate:
    name: Pre-release Smoke Gate
    needs: release
    # Run when release produced a Version PR, OR when manually dispatched
    # (e.g. from a feature branch where the release job was skipped).
    if: |
      always() &&
      needs.release.result != 'failure' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (needs.release.outputs.has_changesets == 'true' && needs.release.outputs.pr_number != '')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:16.9-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout loopstack
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Start local npm registry
        env:
          VERDACCIO_URL: http://127.0.0.1:4873
        run: |
          set -euo pipefail
          docker run -d --rm --name loopstack-release-verdaccio -p 4873:4873 verdaccio/verdaccio:6

          for attempt in $(seq 1 30); do
            if curl -fsS "${VERDACCIO_URL}/-/ping" >/dev/null 2>&1; then
              echo "Verdaccio is ready"
              break
            fi
            if [ "${attempt}" -eq 30 ]; then
              echo "Verdaccio did not become ready" >&2
              exit 1
            fi
            sleep 1
          done

          USER_TOKEN_JSON=$(curl -fsS -X PUT "${VERDACCIO_URL}/-/user/org.couchdb.user:smokegate" \
            -H "Content-Type: application/json" \
            -d '{"name":"smokegate","password":"smokegate"}')
          VERDACCIO_TOKEN=$(node -e "console.log(JSON.parse(process.argv[1]).token || '')" "${USER_TOKEN_JSON}")

          if [ -z "${VERDACCIO_TOKEN}" ]; then
            echo "Could not obtain Verdaccio token" >&2
            echo "${USER_TOKEN_JSON}" >&2
            exit 1
          fi

          NPMRC="${NPM_CONFIG_USERCONFIG:-$HOME/.npmrc}"
          {
            echo "registry=${VERDACCIO_URL}/"
            echo "//127.0.0.1:4873/:_authToken=${VERDACCIO_TOKEN}"
          } > "${NPMRC}"
          echo "Configured npm to use ${VERDACCIO_URL}"

      - name: Compute snapshot tag
        id: snapshot-tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          SNAPSHOT_ID="prerelease-${SHORT_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          echo "tag=${SNAPSHOT_ID}" >> "$GITHUB_OUTPUT"

      - name: Seed snapshot changeset
        env:
          SNAPSHOT_CHANGESET: .changeset/zzz-smoke-gate-snapshot.md
        run: |
          set -euo pipefail
          node -e "
            const fs = require('fs');
            const path = require('path');
            const root = process.cwd();
            const pkg = JSON.parse(fs.readFileSync(path.join(root, 'package.json'), 'utf8'));
            const workspaces = Array.isArray(pkg.workspaces)
              ? pkg.workspaces
              : pkg.workspaces?.packages || [];

            function workspacePackageJsons(pattern) {
              const parts = pattern.split('/');
              const results = [];

              function walk(base, index) {
                if (index === parts.length) {
                  const packageJson = path.join(base, 'package.json');
                  if (fs.existsSync(packageJson)) results.push(packageJson);
                  return;
                }

                const part = parts[index];
                if (part === '*') {
                  if (!fs.existsSync(base)) return;
                  for (const entry of fs.readdirSync(base, { withFileTypes: true })) {
                    if (entry.isDirectory()) walk(path.join(base, entry.name), index + 1);
                  }
                  return;
                }

                walk(path.join(base, part), index + 1);
              }

              walk(root, 0);
              return results;
            }

            const names = new Set();
            for (const workspace of workspaces) {
              for (const packageJson of workspacePackageJsons(workspace)) {
                const packageConfig = JSON.parse(fs.readFileSync(packageJson, 'utf8'));
                if (!packageConfig.private && packageConfig.name) {
                  names.add(packageConfig.name);
                }
              }
            }

            if (names.size === 0) {
              throw new Error('No public packages found for snapshot changeset');
            }

            const changeset = [
              '---',
              ...Array.from(names).sort().map((name) => \`'\${name}': patch\`),
              '---',
              '',
              'Pre-release smoke gate snapshot.',
              '',
            ].join('\n');

            fs.writeFileSync(process.env.SNAPSHOT_CHANGESET, changeset);
            console.log(\`Seeded snapshot changeset for \${names.size} packages\`);
          "

      - name: Publish snapshot to local registry
        env:
          SNAPSHOT_TAG: ${{ steps.snapshot-tag.outputs.tag }}
          SNAPSHOT_CHANGESET: .changeset/zzz-smoke-gate-snapshot.md
        run: |
          set -euo pipefail
          npx changeset version --snapshot "${SNAPSHOT_TAG}"
          npx changeset publish --tag "${SNAPSHOT_TAG}" --no-git-tag
          rm -f "${SNAPSHOT_CHANGESET}"
          git checkout -- .

      - name: Checkout smoke-testing
        uses: actions/checkout@v4
        with:
          repository: loopstack-ai/smoke-testing
          path: smoke-testing
          token: ${{ secrets.SMOKE_TESTING_TOKEN || github.token }}

      - name: Run smoke tests against snapshot
        id: smoke
        uses: ./smoke-testing/.github/actions/run-smoke-tests
        with:
          loopstack_dist_tag: ${{ steps.snapshot-tag.outputs.tag }}
          template_ref: ${{ github.sha }}

      - name: Comment result on Version PR
        if: always()
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ needs.release.outputs.pr_number }}
          GATE_STATUS: ${{ job.status }}
          SNAPSHOT_TAG: ${{ steps.snapshot-tag.outputs.tag }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            if (!prNumber) return;
            const status = process.env.GATE_STATUS;
            const tag = process.env.SNAPSHOT_TAG;
            const url = process.env.RUN_URL;
            const icon = status === 'success' ? '✅' : '❌';
            const body = [
              `### ${icon} Pre-release Smoke Gate: \`${status}\``,
              ``,
              `Snapshot dist-tag: \`${tag}\``,
              `Run: ${url}`,
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });
