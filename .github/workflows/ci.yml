# ============================================================================
# CI Workflow - Runs on PRs to develop and main
# ============================================================================

name: CI

on:
  pull_request:
    branches: [develop, main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # CI - Quality checks, build, and tests in a single job
  # ──────────────────────────────────────────────────────────────────────────
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Check formatting
        run: npm run format:check --if-present

      - name: Lint
        run: npm run lint --if-present

      - name: Run tests
        run: npm test --if-present

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ──────────────────────────────────────────────────────────────────────────
  # Pre-release Hook - Only on PRs to main (excludes develop → main merges)
  # ──────────────────────────────────────────────────────────────────────────
  pre-release-hook:
    name: Pre-release hook
    needs: [ci]
    if: >-
      github.event_name == 'pull_request' &&
      github.base_ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch pre-release event
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.SMOKE_TESTING_TOKEN }}
          repository: loopstack-ai/smoke-testing
          event-type: pre-release
          client-payload: >-
            {
              "ref": "${{ github.event.pull_request.head.sha }}",
              "pr_number": ${{ github.event.pull_request.number }}
            }
